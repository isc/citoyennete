name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

# peaceiris/actions-gh-pages@v4 déclare encore Node.js 20 et le maintainer
# n'a pas publié de v5. À partir de 2026-06-02, GitHub forcera Node 24 par
# défaut ; on opt-in maintenant pour repérer une éventuelle incompatibilité
# avant la deadline plutôt qu'après.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'deploy: main @ ${{ github.sha }}'
